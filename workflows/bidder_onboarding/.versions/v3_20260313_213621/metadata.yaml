category: Compliance
description: Automates bidder registration with SAM.gov and OFAC compliance screening.
  Screens against 138K exclusions and 18K SDN records, then applies auto-approval
  logic.
documentation_path: workflows/bidder_onboarding/documentation.md
estimated_duration: < 5 seconds
icon: ⚙️
id: bidder_onboarding
input_schema:
  age_accepted:
    default: true
    label: Age Verification Accepted
    required: false
    type: checkbox
  bidder_name:
    help_text: Full legal name of the bidder to screen
    label: Bidder Name
    placeholder: e.g., John Smith or ABC Corporation
    required: true
    type: string
  email:
    help_text: Bidder's email address
    label: Email Address
    placeholder: user@example.com
    required: false
    type: email
  phone:
    help_text: Contact phone number
    label: Phone Number
    placeholder: 555-1234
    required: false
    type: string
  property_id:
    help_text: Property ID for the registration
    label: Property ID
    placeholder: e.g., 12345
    required: true
    type: integer
  terms_accepted:
    default: true
    label: Terms and Conditions Accepted
    required: false
    type: checkbox
  user_type:
    default: Investor
    help_text: Type of bidder
    label: User Type
    options:
    - Investor
    - Agent
    - Individual
    - Corporation
    required: false
    type: select
name: Bidder Onboarding & Verification
workflow_number: 1
