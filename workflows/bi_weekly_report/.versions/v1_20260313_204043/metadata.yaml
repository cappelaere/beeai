category: Compliance
description: It produces a weekly executive brief for the BidHom property portfolio.
  The workflow fetches active properties, aggregates metrics (views, brochure/IFB
  downloads, bidder and subscriber registrations), identifies top performers and properties
  needing attention, analyzes the conversion funnel and week-over-week trends, and
  summarizes auction readiness. It then generates recommended actions and a single
  executive brief (narrative + tables) suitable for leadership.
