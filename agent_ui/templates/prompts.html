{% extends "base.html" %}
{% load static %}
{% block title %}Prompts - RealtyIQ Agent{% endblock %}
{% block content %}

<div class="content-header">
  <h2>Prompt Library</h2>
  <p class="text-muted">View, edit, and manage all prompt suggestions</p>
</div>

<div class="prompts-container">
  <!-- Filters and Actions -->
  <div class="prompts-toolbar">
    <div class="toolbar-left">
      <input type="text" id="search-prompts" class="form-control" placeholder="Search prompts..." style="width: 300px;">
      <select id="filter-type" class="form-select" style="width: 220px; margin-left: 0.75rem;">
        <option value="all">All Prompts</option>
        <option value="predefined">Predefined Only</option>
        <option value="user">User Prompts Only</option>
        <option value="popular">Popular (5+ uses)</option>
        <option value="highly_rated">Highly Rated (👍)</option>
        <option value="positive_feedback">Has Positive Feedback</option>
        <option value="negative_feedback">Has Negative Feedback</option>
      </select>
    </div>
    <div class="toolbar-right">
      <button type="button" class="btn btn-primary" id="add-prompt-btn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
        </svg>
        Add Prompt
      </button>
    </div>
  </div>

  <!-- Prompts List -->
  <div class="prompts-list" id="prompts-list">
    <div class="text-center text-muted py-4">Loading prompts...</div>
  </div>
  
  <!-- Pagination -->
  <div class="pagination-container" id="pagination-container" style="display: none;">
    <div class="pagination-info">
      <span id="pagination-info-text"></span>
    </div>
    <nav aria-label="Prompts pagination">
      <ul class="pagination" id="pagination"></ul>
    </nav>
  </div>
</div>

<!-- Edit/Add Prompt Modal -->
<div class="modal fade" id="promptModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="promptModalLabel">Edit Prompt</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <form id="prompt-form">
          <input type="hidden" id="prompt-id">
          <div class="mb-3">
            <label for="prompt-text" class="form-label">Prompt Text</label>
            <textarea class="form-control" id="prompt-text" rows="4" required></textarea>
          </div>
          <div class="form-check mb-3">
            <input class="form-check-input" type="checkbox" id="is-predefined">
            <label class="form-check-label" for="is-predefined">
              Mark as predefined
            </label>
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
        <button type="button" class="btn btn-primary" id="save-prompt-btn">Save</button>
      </div>
    </div>
  </div>
</div>

<style>
.prompts-container {
  max-width: 1200px;
}

.prompts-toolbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 1.5rem;
  gap: 1rem;
  flex-wrap: wrap;
}

.toolbar-left {
  display: flex;
  align-items: center;
  gap: 0.75rem;
  flex: 1;
}

.toolbar-right {
  display: flex;
  gap: 0.5rem;
}

.prompts-list {
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: 0.5rem;
  overflow: hidden;
}

.prompt-item {
  display: flex;
  align-items: flex-start;
  gap: 1rem;
  padding: 1rem;
  border-bottom: 1px solid var(--border);
  transition: background 0.15s ease;
}

.prompt-item:last-child {
  border-bottom: none;
}

.prompt-item:hover {
  background: var(--gray-10);
}

.prompt-content {
  flex: 1;
  min-width: 0;
}

.prompt-text {
  font-size: 0.9375rem;
  color: var(--gray-90);
  margin-bottom: 0.5rem;
  line-height: 1.5;
}

.prompt-meta {
  display: flex;
  align-items: center;
  gap: 1rem;
  font-size: 0.8125rem;
  color: #6f6f6f;
  flex-wrap: wrap;
}

.prompt-badge {
  display: inline-flex;
  align-items: center;
  gap: 0.25rem;
  padding: 0.125rem 0.5rem;
  border-radius: 0.25rem;
  font-size: 0.75rem;
  font-weight: 600;
}

.badge-predefined {
  background: rgba(15, 98, 254, 0.1);
  color: var(--blue-60);
}

.badge-user {
  background: rgba(36, 161, 72, 0.1);
  color: #24a148;
}

.badge-usage {
  background: rgba(255, 131, 43, 0.1);
  color: #ff832b;
}

.badge-positive {
  background: rgba(36, 161, 72, 0.1);
  color: #24a148;
}

.badge-negative {
  background: rgba(218, 30, 40, 0.1);
  color: #da1e28;
}

.prompt-actions {
  display: flex;
  gap: 0.25rem;
}

.prompt-action-btn {
  padding: 0.375rem;
  background: transparent;
  border: none;
  cursor: pointer;
  border-radius: 0.25rem;
  transition: background 0.15s ease;
  color: #6f6f6f;
}

.prompt-action-btn:hover {
  background: var(--gray-10);
  color: var(--gray-90);
}

.prompt-run-btn:hover {
  background: rgba(36, 161, 72, 0.1);
  color: #24a148;
}

.prompt-delete-btn:hover {
  background: rgba(218, 30, 40, 0.1);
  color: #da1e28;
}

/* Dark theme */
.theme-dark .prompts-list {
  background: var(--white);
  border-color: var(--border);
}

.theme-dark .prompt-item {
  border-color: var(--border);
}

.theme-dark .prompt-item:hover {
  background: var(--gray-10);
}

.theme-dark .prompt-text {
  color: var(--gray-90);
}

.theme-dark .prompt-action-btn {
  color: #a8a8a8;
}

.theme-dark .prompt-action-btn:hover {
  background: var(--gray-10);
  color: var(--gray-90);
}

.theme-dark .prompt-run-btn:hover {
  background: rgba(36, 161, 72, 0.1);
  color: #42be65;
}

.theme-dark .prompt-delete-btn:hover {
  background: rgba(218, 30, 40, 0.1);
  color: #ff6b6b;
}

.theme-dark .badge-positive {
  background: rgba(36, 161, 72, 0.15);
  color: #42be65;
}

.theme-dark .badge-negative {
  background: rgba(218, 30, 40, 0.15);
  color: #ff6b6b;
}

/* Pagination */
.pagination-container {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-top: 1.5rem;
  padding: 1rem;
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: 0.5rem;
  flex-wrap: wrap;
  gap: 1rem;
}

.pagination-info {
  font-size: 0.875rem;
  color: #6f6f6f;
}

.pagination {
  display: flex;
  list-style: none;
  margin: 0;
  padding: 0;
  gap: 0.25rem;
}

.page-item {
  display: flex;
}

.page-link {
  padding: 0.5rem 0.75rem;
  background: transparent;
  border: 1px solid var(--border);
  color: var(--gray-90);
  text-decoration: none;
  border-radius: 0.25rem;
  cursor: pointer;
  font-size: 0.875rem;
  transition: all 0.15s ease;
}

.page-link:hover {
  background: var(--gray-10);
  border-color: var(--blue-60);
  color: var(--blue-60);
}

.page-item.active .page-link {
  background: var(--blue-60);
  border-color: var(--blue-60);
  color: white;
}

.page-item.disabled .page-link {
  cursor: not-allowed;
  opacity: 0.5;
  pointer-events: none;
}

/* Dark theme pagination */
.theme-dark .pagination-container {
  background: var(--white);
  border-color: var(--border);
}

.theme-dark .pagination-info {
  color: #a8a8a8;
}

.theme-dark .page-link {
  background: transparent;
  border-color: var(--border);
  color: var(--gray-90);
}

.theme-dark .page-link:hover {
  background: var(--gray-10);
  border-color: var(--blue-60);
  color: var(--blue-60);
}

.theme-dark .page-item.active .page-link {
  background: var(--blue-60);
  border-color: var(--blue-60);
  color: white;
}
</style>

<script>
(function () {
  "use strict";

  var promptsList = document.getElementById("prompts-list");
  var searchInput = document.getElementById("search-prompts");
  var filterType = document.getElementById("filter-type");
  var addPromptBtn = document.getElementById("add-prompt-btn");
  var paginationContainer = document.getElementById("pagination-container");
  var paginationEl = document.getElementById("pagination");
  var paginationInfoEl = document.getElementById("pagination-info-text");
  var promptModal = null;
  var currentPrompts = [];
  var currentPage = 1;
  var totalPages = 1;
  var totalCount = 0;
  var pageSize = 20;
  var searchDebounceTimer = null;

  function init() {
    promptModal = new bootstrap.Modal(document.getElementById("promptModal"));
    
    // Event listeners
    if (searchInput) {
      searchInput.addEventListener("input", handleSearchInput);
    }
    if (filterType) {
      filterType.addEventListener("change", handleFilterChange);
    }
    if (addPromptBtn) {
      addPromptBtn.addEventListener("click", showAddPromptModal);
    }
    var saveBtn = document.getElementById("save-prompt-btn");
    if (saveBtn) {
      saveBtn.addEventListener("click", savePrompt);
    }
    
    // Load prompts
    loadPrompts();
  }

  function handleSearchInput() {
    // Debounce search input
    if (searchDebounceTimer) {
      clearTimeout(searchDebounceTimer);
    }
    searchDebounceTimer = setTimeout(function() {
      currentPage = 1; // Reset to first page on search
      loadPrompts();
    }, 300);
  }

  function handleFilterChange() {
    currentPage = 1; // Reset to first page on filter change
    loadPrompts();
  }

  function loadPrompts(page) {
    if (page) currentPage = page;
    
    var search = searchInput ? searchInput.value.trim() : "";
    var filter = filterType ? filterType.value : "all";
    
    var params = new URLSearchParams({
      page: currentPage,
      page_size: pageSize,
      filter: filter
    });
    
    if (search) {
      params.append("search", search);
      console.log("Searching for:", search);
    }
    
    var url = "/api/prompts/?" + params.toString();
    console.log("Fetching:", url);
    
    promptsList.innerHTML = '<div class="text-center text-muted py-4">Loading...</div>';
    
    fetch(url)
      .then(function (r) { 
        if (!r.ok) {
          throw new Error("HTTP " + r.status);
        }
        return r.json(); 
      })
      .then(function (data) {
        console.log("Received", data.prompts.length, "prompts, total:", data.pagination.total_count);
        currentPrompts = data.prompts || [];
        var pagination = data.pagination || {};
        
        currentPage = pagination.page || 1;
        totalPages = pagination.total_pages || 1;
        totalCount = pagination.total_count || 0;
        
        renderPrompts(currentPrompts);
        renderPagination(pagination);
      })
      .catch(function (err) {
        console.error("Failed to load prompts:", err);
        promptsList.innerHTML = '<div class="text-center text-danger py-4">Failed to load prompts. Check console for details.</div>';
      });
  }

  function renderPrompts(prompts) {
    if (!promptsList) {
      console.error("promptsList element not found");
      return;
    }
    
    if (prompts.length === 0) {
      promptsList.innerHTML = '<div class="text-center text-muted py-4">No prompts found matching your search</div>';
      return;
    }
    
    promptsList.innerHTML = "";
    
    prompts.forEach(function (prompt) {
      var item = document.createElement("div");
      item.className = "prompt-item";
      
      var content = document.createElement("div");
      content.className = "prompt-content";
      
      var text = document.createElement("div");
      text.className = "prompt-text";
      text.textContent = prompt.prompt;
      content.appendChild(text);
      
      var meta = document.createElement("div");
      meta.className = "prompt-meta";
      
      // Type badge
      var typeBadge = document.createElement("span");
      typeBadge.className = "prompt-badge " + (prompt.is_predefined ? "badge-predefined" : "badge-user");
      typeBadge.textContent = prompt.is_predefined ? "Predefined" : "User";
      meta.appendChild(typeBadge);
      
      // Usage badge
      if (prompt.usage_count > 0) {
        var usageBadge = document.createElement("span");
        usageBadge.className = "prompt-badge badge-usage";
        usageBadge.textContent = prompt.usage_count + " use" + (prompt.usage_count > 1 ? "s" : "");
        meta.appendChild(usageBadge);
      }
      
      // Feedback badges
      if (prompt.positive_feedback > 0) {
        var positiveBadge = document.createElement("span");
        positiveBadge.className = "prompt-badge badge-positive";
        positiveBadge.textContent = "👍 " + prompt.positive_feedback;
        positiveBadge.title = prompt.positive_feedback + " positive rating" + (prompt.positive_feedback > 1 ? "s" : "");
        meta.appendChild(positiveBadge);
      }
      
      if (prompt.negative_feedback > 0) {
        var negativeBadge = document.createElement("span");
        negativeBadge.className = "prompt-badge badge-negative";
        negativeBadge.textContent = "👎 " + prompt.negative_feedback;
        negativeBadge.title = prompt.negative_feedback + " negative rating" + (prompt.negative_feedback > 1 ? "s" : "");
        meta.appendChild(negativeBadge);
      }
      
      // Last used
      if (prompt.last_used) {
        var lastUsed = document.createElement("span");
        lastUsed.textContent = "Last used: " + formatDate(prompt.last_used);
        meta.appendChild(lastUsed);
      }
      
      content.appendChild(meta);
      item.appendChild(content);
      
      // Actions
      var actions = document.createElement("div");
      actions.className = "prompt-actions";
      
      var runBtn = document.createElement("button");
      runBtn.className = "prompt-action-btn prompt-run-btn";
      runBtn.title = "Run this prompt";
      runBtn.innerHTML = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="5 3 19 12 5 21 5 3"/></svg>';
      runBtn.addEventListener("click", function () { runPrompt(prompt.prompt); });
      actions.appendChild(runBtn);
      
      var editBtn = document.createElement("button");
      editBtn.className = "prompt-action-btn";
      editBtn.title = "Edit prompt";
      editBtn.innerHTML = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>';
      editBtn.addEventListener("click", function () { showEditPromptModal(prompt); });
      actions.appendChild(editBtn);
      
      var deleteBtn = document.createElement("button");
      deleteBtn.className = "prompt-action-btn prompt-delete-btn";
      deleteBtn.title = "Delete prompt";
      deleteBtn.innerHTML = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>';
      deleteBtn.addEventListener("click", function () { deletePrompt(prompt.id); });
      actions.appendChild(deleteBtn);
      
      item.appendChild(actions);
      promptsList.appendChild(item);
    });
  }

  function showAddPromptModal() {
    document.getElementById("promptModalLabel").textContent = "Add Prompt";
    document.getElementById("prompt-id").value = "";
    document.getElementById("prompt-text").value = "";
    document.getElementById("is-predefined").checked = false;
    promptModal.show();
  }

  function showEditPromptModal(prompt) {
    document.getElementById("promptModalLabel").textContent = "Edit Prompt";
    document.getElementById("prompt-id").value = prompt.id;
    document.getElementById("prompt-text").value = prompt.prompt;
    document.getElementById("is-predefined").checked = prompt.is_predefined;
    promptModal.show();
  }

  function savePrompt() {
    var id = document.getElementById("prompt-id").value;
    var text = document.getElementById("prompt-text").value.trim();
    var isPredefined = document.getElementById("is-predefined").checked;
    
    if (!text) {
      alert("Prompt text is required");
      return;
    }
    
    var url = id ? "/api/prompts/" + id + "/update/" : "/api/prompts/create/";
    var method = "POST";
    
    fetch(url, {
      method: method,
      headers: {
        "Content-Type": "application/json",
        "X-CSRFToken": getCsrfToken(),
      },
      body: JSON.stringify({
        prompt: text,
        is_predefined: isPredefined
      })
    })
    .then(function (r) { return r.json(); })
    .then(function (data) {
      if (data.error) {
        alert("Error: " + data.error);
      } else {
        promptModal.hide();
        loadPrompts();
      }
    })
    .catch(function (err) {
      console.error("Failed to save prompt:", err);
      alert("Failed to save prompt");
    });
  }

  function runPrompt(promptText) {
    console.log("Storing prompt in sessionStorage:", promptText);
    
    // Store the prompt in sessionStorage to be picked up by chat page
    sessionStorage.setItem("pendingPrompt", promptText);
    
    // Verify it was stored
    var stored = sessionStorage.getItem("pendingPrompt");
    console.log("Verified stored prompt:", stored);
    
    // Navigate to chat page (home page)
    console.log("Navigating to home page...");
    window.location.href = "/";
  }

  function deletePrompt(id) {
    if (!confirm("Are you sure you want to delete this prompt?")) {
      return;
    }
    
    fetch("/api/prompts/" + id + "/delete/", {
      method: "DELETE",
      headers: {
        "X-CSRFToken": getCsrfToken(),
      }
    })
    .then(function (r) { return r.json(); })
    .then(function (data) {
      if (data.error) {
        alert("Error: " + data.error);
      } else {
        loadPrompts();
      }
    })
    .catch(function (err) {
      console.error("Failed to delete prompt:", err);
      alert("Failed to delete prompt");
    });
  }

  function getCsrfToken() {
    var name = "csrftoken";
    var cookies = document.cookie.split(";");
    for (var i = 0; i < cookies.length; i++) {
      var cookie = cookies[i].trim();
      if (cookie.startsWith(name + "=")) {
        return cookie.substring(name.length + 1);
      }
    }
    return "";
  }

  function renderPagination(pagination) {
    if (!pagination || totalPages <= 1) {
      paginationContainer.style.display = "none";
      return;
    }
    
    paginationContainer.style.display = "flex";
    
    // Update info text
    var start = (currentPage - 1) * pageSize + 1;
    var end = Math.min(currentPage * pageSize, totalCount);
    paginationInfoEl.textContent = "Showing " + start + "-" + end + " of " + totalCount + " prompts";
    
    // Clear pagination
    paginationEl.innerHTML = "";
    
    // Previous button
    var prevLi = document.createElement("li");
    prevLi.className = "page-item" + (!pagination.has_previous ? " disabled" : "");
    var prevLink = document.createElement("a");
    prevLink.className = "page-link";
    prevLink.href = "#";
    prevLink.textContent = "Previous";
    prevLink.addEventListener("click", function(e) {
      e.preventDefault();
      if (pagination.has_previous) {
        loadPrompts(currentPage - 1);
      }
    });
    prevLi.appendChild(prevLink);
    paginationEl.appendChild(prevLi);
    
    // Page numbers
    var maxButtons = 7;
    var startPage = Math.max(1, currentPage - Math.floor(maxButtons / 2));
    var endPage = Math.min(totalPages, startPage + maxButtons - 1);
    
    if (endPage - startPage < maxButtons - 1) {
      startPage = Math.max(1, endPage - maxButtons + 1);
    }
    
    // First page
    if (startPage > 1) {
      appendPageButton(1);
      if (startPage > 2) {
        var ellipsisLi = document.createElement("li");
        ellipsisLi.className = "page-item disabled";
        var ellipsisSpan = document.createElement("span");
        ellipsisSpan.className = "page-link";
        ellipsisSpan.textContent = "...";
        ellipsisLi.appendChild(ellipsisSpan);
        paginationEl.appendChild(ellipsisLi);
      }
    }
    
    // Page buttons
    for (var i = startPage; i <= endPage; i++) {
      appendPageButton(i);
    }
    
    // Last page
    if (endPage < totalPages) {
      if (endPage < totalPages - 1) {
        var ellipsisLi = document.createElement("li");
        ellipsisLi.className = "page-item disabled";
        var ellipsisSpan = document.createElement("span");
        ellipsisSpan.className = "page-link";
        ellipsisSpan.textContent = "...";
        ellipsisLi.appendChild(ellipsisSpan);
        paginationEl.appendChild(ellipsisLi);
      }
      appendPageButton(totalPages);
    }
    
    // Next button
    var nextLi = document.createElement("li");
    nextLi.className = "page-item" + (!pagination.has_next ? " disabled" : "");
    var nextLink = document.createElement("a");
    nextLink.className = "page-link";
    nextLink.href = "#";
    nextLink.textContent = "Next";
    nextLink.addEventListener("click", function(e) {
      e.preventDefault();
      if (pagination.has_next) {
        loadPrompts(currentPage + 1);
      }
    });
    nextLi.appendChild(nextLink);
    paginationEl.appendChild(nextLi);
  }
  
  function appendPageButton(pageNum) {
    var li = document.createElement("li");
    li.className = "page-item" + (pageNum === currentPage ? " active" : "");
    var link = document.createElement("a");
    link.className = "page-link";
    link.href = "#";
    link.textContent = pageNum;
    link.addEventListener("click", function(e) {
      e.preventDefault();
      if (pageNum !== currentPage) {
        loadPrompts(pageNum);
      }
    });
    li.appendChild(link);
    paginationEl.appendChild(li);
  }

  function formatDate(isoString) {
    var date = new Date(isoString);
    var now = new Date();
    var diff = now - date;
    var seconds = Math.floor(diff / 1000);
    var minutes = Math.floor(seconds / 60);
    var hours = Math.floor(minutes / 60);
    var days = Math.floor(hours / 24);
    
    if (days > 7) {
      return date.toLocaleDateString();
    } else if (days > 0) {
      return days + " day" + (days > 1 ? "s" : "") + " ago";
    } else if (hours > 0) {
      return hours + " hour" + (hours > 1 ? "s" : "") + " ago";
    } else if (minutes > 0) {
      return minutes + " minute" + (minutes > 1 ? "s" : "") + " ago";
    } else {
      return "Just now";
    }
  }

  // Initialize on DOM ready
  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", init);
  } else {
    init();
  }
})();
</script>

{% endblock %}
