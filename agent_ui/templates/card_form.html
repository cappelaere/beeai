{% extends "base.html" %}
{% block title %}{% if card %}Edit{% else %}Create{% endif %} Card - RealtyIQ Agent{% endblock %}
{% block content %}
<h1>{% if card %}Edit card{% else %}Create new card{% endif %}</h1>
<form method="post" class="card-form">
    {% csrf_token %}
    {{ form.as_p }}
    <p>
        <button type="submit" class="btn btn-primary">Save</button>
        <a href="{% url 'cards' %}" class="btn btn-secondary">Cancel</a>
    </p>
</form>
{% endblock %}
