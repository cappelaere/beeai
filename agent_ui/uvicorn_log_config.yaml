# Uvicorn logging config: same format as Django (LEVEL TIMESTAMP NAME MESSAGE).
# Short timestamp YYYY-MM-DD HH:MM:SS; log level colored.
version: 1
disable_existing_loggers: false
formatters:
  default:
    "()": "agent_ui.agent_ui.log_formatter.DjangoStyleFormatter"
    datefmt: "%Y-%m-%d %H:%M:%S"
    use_colors: true
  access:
    "()": "uvicorn.logging.AccessFormatter"
    fmt: '%(levelprefix)s %(client_addr)s - "%(request_line)s" %(status_code)s'
handlers:
  default:
    formatter: default
    class: logging.StreamHandler
    stream: ext://sys.stderr
  access:
    formatter: access
    class: logging.StreamHandler
    stream: ext://sys.stdout
loggers:
  uvicorn:
    handlers: [default]
    level: INFO
    propagate: false
  uvicorn.error:
    level: INFO
    handlers: [default]
    propagate: false
  uvicorn.access:
    handlers: [access]
    level: INFO
    propagate: false
